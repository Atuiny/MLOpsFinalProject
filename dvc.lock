schema: '2.0'
stages:
  clean:
    cmd: python src/CleanData.py --params params.yaml
    deps:
    - path: data/raw/credit_card_data.csv
      hash: md5
      md5: e3e6816e421b06706ddd35897e2f1b89
      size: 76277977
    - path: src/CleanData.py
      hash: md5
      md5: 43ca2bea4c6facb9e123445509470b05
      size: 8724
    params:
      params.yaml:
        clean_data:
          input_csv: data/raw/credit_card_data.csv
          output_csv: data/processed/credit_card_clean.csv
          report_json: data/processed/cleaning_report.json
          expected_columns:
          - distance_from_home
          - distance_from_last_transaction
          - ratio_to_median_purchase_price
          - repeat_retailer
          - used_chip
          - used_pin_number
          - online_order
          - fraud
          float_columns:
          - distance_from_home
          - distance_from_last_transaction
          - ratio_to_median_purchase_price
          binary_columns:
          - repeat_retailer
          - used_chip
          - used_pin_number
          - online_order
          - fraud
          target_column: fraud
          enforce_non_negative: true
          max_float_values:
            distance_from_home:
            distance_from_last_transaction:
            ratio_to_median_purchase_price:
          strict: true
          drop_duplicates: false
    outs:
    - path: data/processed/cleaning_report.json
      hash: md5
      md5: 0c0abb4ff4f9e84bf0b5e3212b11f548
      size: 1508
    - path: data/processed/credit_card_clean.csv
      hash: md5
      md5: 18dd95eba2c3b5720105518a22c6093b
      size: 67277978
  train:
    cmd: python src/Train.py --params params.yaml
    deps:
    - path: data/processed/credit_card_clean.csv
      hash: md5
      md5: 18dd95eba2c3b5720105518a22c6093b
      size: 67277978
    - path: src/Train.py
      hash: md5
      md5: a7f5398fde18d9fb29c7e90f6e0d506a
      size: 11203
    params:
      params.yaml:
        train:
          input_csv: data/processed/credit_card_clean.csv
          expected_columns:
          - distance_from_home
          - distance_from_last_transaction
          - ratio_to_median_purchase_price
          - repeat_retailer
          - used_chip
          - used_pin_number
          - online_order
          - fraud
          feature_columns:
          - distance_from_home
          - distance_from_last_transaction
          - ratio_to_median_purchase_price
          - repeat_retailer
          - used_chip
          - used_pin_number
          - online_order
          target_column: fraud
          test_size: 0.2
          random_state: 42
          decision_threshold: 0.5
          max_rows:
          models:
            lr:
              enabled: true
              type: logistic_regression
              model_out: modelinfo/modelpkl/fraud_model_lr.joblib
              metrics_out: data/processed/train_metrics_lr.json
              use_standard_scaler: true
              params:
                penalty:
                C: 1.0
                solver: lbfgs
                max_iter: 200
                class_weight: balanced
                random_state: 42
            rf:
              enabled: true
              type: random_forest
              model_out: modelinfo/modelpkl/fraud_model_rf.joblib
              metrics_out: data/processed/train_metrics_rf.json
              use_standard_scaler: false
              params:
                n_estimators: 300
                max_depth:
                min_samples_split: 2
                min_samples_leaf: 1
                max_features: sqrt
                class_weight: balanced
                n_jobs: -1
                random_state: 42
            dt:
              enabled: true
              type: decision_tree
              model_out: modelinfo/modelpkl/fraud_model_dt.joblib
              metrics_out: data/processed/train_metrics_dt.json
              use_standard_scaler: false
              params:
                max_depth:
                min_samples_split: 2
                min_samples_leaf: 1
                class_weight: balanced
                random_state: 42
    outs:
    - path: data/processed/train_metrics_dt.json
      hash: md5
      md5: 12fa667471f17eb25203633468599961
      size: 545
    - path: data/processed/train_metrics_lr.json
      hash: md5
      md5: be4a5f06a44bc63342a75714d3d7336a
      size: 567
    - path: data/processed/train_metrics_rf.json
      hash: md5
      md5: 01733622b2af3c77217009f16e67942c
      size: 545
    - path: modelinfo/modelpkl/fraud_model_dt.joblib
      hash: md5
      md5: f03cb0d8db42aa387b757a3eb2576608
      size: 9149
